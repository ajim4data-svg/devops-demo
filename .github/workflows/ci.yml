name: CI/CD to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ajim4datagmailcom/devops-demo:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify Docker secrets
        run: |
          echo "Verifying Docker secrets are set (values are hidden)..."
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_USERNAME or DOCKER_PASSWORD is not set in repository secrets"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Set Kubernetes context
        uses: azure/setup-kubectl@v3

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_CONTENT" ]; then
            echo "KUBECONFIG secret not set — skipping Kubernetes deployment"
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          kubectl set image deployment/devops-deployment devops-container=${{ env.IMAGE_NAME }}
