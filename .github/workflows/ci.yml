name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check EC2 SSH connectivity
        run: |
          HOST="${{ secrets.EC2_HOST }}"
          echo "Checking SSH connectivity to $HOST:22"
          python3 - <<'PY'
import os, socket, sys
host=os.environ.get('HOST')
s=socket.socket()
s.settimeout(5)
try:
    s.connect((host,22))
    print('SSH port reachable')
except Exception as e:
    print('SSH port unreachable:', e)
    sys.exit(1)
finally:
    s.close()
PY

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd devops-demo || git clone https://github.com/ajim4data-svg/devops-demo.git && cd devops-demo
            git pull
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker rm $(sudo docker ps -aq) || true
            sudo docker build -t devops-demo .
            sudo docker run -d -p 3000:3000 devops-demo