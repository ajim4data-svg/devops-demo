name: CI/CD to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ajim4datagmailcom/devops-demo:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify Docker secrets
        run: |
          echo "Verifying Docker secrets are set (values are hidden)..."
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_USERNAME or DOCKER_PASSWORD is not set in repository secrets"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Setup kubectl CLI
        uses: azure/setup-kubectl@v3

      - name: Deploy using KUBECONFIG secret
        if: ${{ secrets.KUBECONFIG != '' }}
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          echo "Using KUBECONFIG secret to deploy"
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          kubectl set image deployment/devops-deployment devops-container=${{ env.IMAGE_NAME }}

      - name: Configure AWS credentials for EKS
        if: ${{ secrets.KUBECONFIG == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EKS_CLUSTER_NAME != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        if: ${{ secrets.KUBECONFIG == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EKS_CLUSTER_NAME != '' }}
        uses: aws-actions/eks-update-kubeconfig@v1
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        if: ${{ secrets.KUBECONFIG == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EKS_CLUSTER_NAME != '' }}
        run: |
          kubectl set image deployment/devops-deployment devops-container=${{ env.IMAGE_NAME }}
